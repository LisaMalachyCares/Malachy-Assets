<style>
  .malachy-map-wrap {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    font-family: 'Outfit', Helvetica, Arial, Lucida, sans-serif;
  }
  #malachy-map {
    width: 100%;
    height: 600px;
    border-radius: 10px;
    overflow: hidden;
  }
  .malachy-map-legend {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
    padding-bottom: 10px;
  }
  .malachy-map-legend span {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: #ccc;
    font-family: 'Outfit', Helvetica, Arial, Lucida, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .malachy-map-legend .dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    background: #39b54a;
    opacity: 0.75;
    flex-shrink: 0;
  }
</style>

<div class="malachy-map-wrap">
  <div id="malachy-map"></div>
  <div class="malachy-map-legend">
    <span><span class="dot"></span>NJ Service Counties</span>
    <span><span class="dot" style="opacity:0.9"></span>NYC & Long Island</span>
    <span><span class="dot" style="opacity:0.6"></span>Philadelphia & Bucks County PA</span>
    <span><span class="dot" style="opacity:0.5"></span>Connecticut</span>
  </div>
</div>

<script>
(function() {

  // Dark map style
  var darkStyle = [
    { elementType: "geometry", stylers: [{ color: "#1a1a1a" }] },
    { elementType: "labels.text.fill", stylers: [{ color: "#8a8a8a" }] },
    { elementType: "labels.text.stroke", stylers: [{ color: "#1a1a1a" }] },
    { featureType: "administrative", elementType: "geometry.stroke", stylers: [{ color: "#333333" }] },
    { featureType: "administrative.land_parcel", elementType: "labels.text.fill", stylers: [{ color: "#555555" }] },
    { featureType: "administrative.province", elementType: "geometry.stroke", stylers: [{ color: "#444444" }, { weight: 1.5 }] },
    { featureType: "poi", stylers: [{ visibility: "off" }] },
    { featureType: "road", stylers: [{ visibility: "off" }] },
    { featureType: "transit", stylers: [{ visibility: "off" }] },
    { featureType: "water", elementType: "geometry", stylers: [{ color: "#0d0d0d" }] },
    { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#333333" }] }
  ];

  // Service area county data: [name, lat, lng, state]
  var serviceCounties = [
    // NJ Counties
    { name: "Bergen", lat: 40.9584, lng: -74.0756, state: "NJ" },
    { name: "Passaic", lat: 41.0023, lng: -74.2996, state: "NJ" },
    { name: "Essex", lat: 40.7877, lng: -74.2476, state: "NJ" },
    { name: "Sussex", lat: 41.1426, lng: -74.6902, state: "NJ" },
    { name: "Hudson", lat: 40.7281, lng: -74.0776, state: "NJ" },
    { name: "Union", lat: 40.6601, lng: -74.2635, state: "NJ" },
    { name: "Hunterdon", lat: 40.5676, lng: -74.9218, state: "NJ" },
    { name: "Somerset", lat: 40.5651, lng: -74.6099, state: "NJ" },
    { name: "Warren", lat: 40.8457, lng: -74.9957, state: "NJ" },
    { name: "Mercer", lat: 40.2837, lng: -74.6877, state: "NJ" },
    { name: "Middlesex", lat: 40.4396, lng: -74.4074, state: "NJ" },
    { name: "Monmouth", lat: 40.2876, lng: -74.1468, state: "NJ" },
    { name: "Morris", lat: 40.8693, lng: -74.5573, state: "NJ" },
    { name: "Ocean", lat: 39.9168, lng: -74.2654, state: "NJ" },
    { name: "Burlington", lat: 39.8775, lng: -74.6671, state: "NJ" },
    { name: "Atlantic", lat: 39.4679, lng: -74.6318, state: "NJ" },
    { name: "Camden", lat: 39.8007, lng: -74.9596, state: "NJ" },
    { name: "Gloucester", lat: 39.7148, lng: -75.1413, state: "NJ" },
    // NYC Boroughs
    { name: "Manhattan", lat: 40.7831, lng: -73.9712, state: "NY" },
    { name: "Brooklyn", lat: 40.6782, lng: -73.9442, state: "NY" },
    { name: "Queens", lat: 40.7282, lng: -73.7949, state: "NY" },
    { name: "Bronx", lat: 40.8448, lng: -73.8648, state: "NY" },
    { name: "Staten Island", lat: 40.5795, lng: -74.1502, state: "NY" },
    { name: "Rockland County", lat: 41.1489, lng: -74.0262, state: "NY" },
    // Long Island
    { name: "Nassau County", lat: 40.6546, lng: -73.5594, state: "NY" },
    { name: "Suffolk County", lat: 40.8815, lng: -72.9957, state: "NY" },
    // Philadelphia
    { name: "Philadelphia", lat: 39.9526, lng: -75.1652, state: "PA" },
    // Bucks County PA
    { name: "Bucks County", lat: 40.3396, lng: -75.1330, state: "PA" },
    // Connecticut
    { name: "Fairfield County", lat: 41.2076, lng: -73.3832, state: "CT" },
    { name: "Stamford", lat: 41.0534, lng: -73.5387, state: "CT" },
  ];

  // Color per state/region
  function getColor(state) {
    if (state === "NJ") return "#39b54a";
    if (state === "NY") return "#39b54a";
    if (state === "PA") return "#2e9e3e";
    if (state === "CT") return "#267a31";
    return "#39b54a";
  }

  window.initMalachyMap = function() {
    var map = new google.maps.Map(document.getElementById('malachy-map'), {
      center: { lat: 40.6, lng: -73.8 },
      zoom: 7,
      styles: darkStyle,
      disableDefaultUI: false,
      zoomControl: true,
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: true,
      scrollwheel: false
    });

    // Load county polygons via Data layer using Census TIGER GeoJSON
    var regions = [
      // NJ
      { url: "https://raw.githubusercontent.com/johan/world.geo.json/master/countries/USA/NJ.geo.json", color: "#39b54a" },
    ];

    // Use Google Maps Data layer to draw county boundaries
    // We'll use a curated approach: draw filled circles/polygons per county centroid
    // and also load state outlines

    // Draw service area markers with county label tooltips
    var infoWindow = new google.maps.InfoWindow();

    serviceCounties.forEach(function(county) {
      var marker = new google.maps.Marker({
        position: { lat: county.lat, lng: county.lng },
        map: map,
        title: county.name + ", " + county.state,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: county.state === "NJ" ? 18 : 13,
          fillColor: getColor(county.state),
          fillOpacity: 0.35,
          strokeColor: getColor(county.state),
          strokeWeight: 1.5,
          strokeOpacity: 0.8
        }
      });

      marker.addListener('click', function() {
        infoWindow.setContent(
          '<div style="font-family:Outfit,Helvetica,sans-serif;font-size:13px;font-weight:700;color:#222;padding:2px 4px;">' +
          county.name + ', ' + county.state +
          '<br><span style="font-weight:400;color:#555;">✅ Malachy services this area</span></div>'
        );
        infoWindow.open(map, marker);
      });
    });

    // Draw state boundary outlines using Data layer
    var stateUrls = [
      "https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json"
    ];

    // Overlay semi-transparent region polygons using boundaries
    // Draw NJ polygon highlight via GeoJSON
    var njLayer = new google.maps.Data({ map: map });
    njLayer.loadGeoJson(
      'https://raw.githubusercontent.com/deldersveld/topojson/master/countries/us-states/NJ-34-new-jersey-counties.json',
      null,
      function() {}
    );
    njLayer.setStyle({
      fillColor: '#39b54a',
      fillOpacity: 0.18,
      strokeColor: '#39b54a',
      strokeWeight: 1,
      strokeOpacity: 0.5
    });

    var nyLayer = new google.maps.Data({ map: map });
    nyLayer.loadGeoJson(
      'https://raw.githubusercontent.com/deldersveld/topojson/master/countries/us-states/NY-36-new-york-counties.json',
      null,
      function() {}
    );
    nyLayer.setStyle(function(feature) {
      var name = feature.getProperty('NAME') || feature.getProperty('name') || '';
      var nyc = ['New York','Kings','Queens','Bronx','Richmond','Nassau','Suffolk','Rockland'];
      var match = nyc.some(function(n){ return name.indexOf(n) > -1; });
      return {
        fillColor: '#39b54a',
        fillOpacity: match ? 0.22 : 0,
        strokeColor: '#39b54a',
        strokeWeight: match ? 1 : 0,
        strokeOpacity: match ? 0.5 : 0
      };
    });

    var paLayer = new google.maps.Data({ map: map });
    paLayer.loadGeoJson(
      'https://raw.githubusercontent.com/deldersveld/topojson/master/countries/us-states/PA-42-pennsylvania-counties.json',
      null,
      function() {}
    );
    paLayer.setStyle(function(feature) {
      var name = feature.getProperty('NAME') || feature.getProperty('name') || '';
      var pa = ['Philadelphia','Bucks'];
      var match = pa.some(function(n){ return name.indexOf(n) > -1; });
      return {
        fillColor: '#39b54a',
        fillOpacity: match ? 0.18 : 0,
        strokeColor: '#39b54a',
        strokeWeight: match ? 1 : 0,
        strokeOpacity: match ? 0.4 : 0
      };
    });

    var ctLayer = new google.maps.Data({ map: map });
    ctLayer.loadGeoJson(
      'https://raw.githubusercontent.com/deldersveld/topojson/master/countries/us-states/CT-09-connecticut-counties.json',
      null,
      function() {}
    );
    ctLayer.setStyle(function(feature) {
      var name = feature.getProperty('NAME') || feature.getProperty('name') || '';
      var ct = ['Fairfield'];
      var match = ct.some(function(n){ return name.indexOf(n) > -1; });
      return {
        fillColor: '#39b54a',
        fillOpacity: match ? 0.18 : 0,
        strokeColor: '#39b54a',
        strokeWeight: match ? 1 : 0,
        strokeOpacity: match ? 0.4 : 0
      };
    });
  };

})();
</script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBwNiTk8oJImPNaTODMf1tXHXcFyqyfBOo&callback=initMalachyMap">
</script>
